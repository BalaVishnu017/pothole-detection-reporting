name: CI — InfraVision AI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Lint
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint (flake8 + isort)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting tools
        run: pip install flake8 isort black

      - name: Run flake8
        run: flake8 app/ config/ tests/ scripts/ app.py --max-line-length=100 --ignore=E501,W503

      - name: Check import sorting (isort)
        run: isort --check-only app/ config/ tests/ scripts/ app.py

      - name: Check formatting (black)
        run: black --check app/ config/ tests/ scripts/ app.py --line-length=100

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Test
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test Suite (pytest)
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data models outputs

      - name: Create dummy .env for tests
        run: |
          cat > .env << 'EOF'
          SENDER_EMAIL=test@example.com
          SENDER_PASSWORD=dummy_password
          ROAD_DEPT_EMAIL=dept@example.com
          CONFIDENCE_THRESHOLD=0.5
          CRITICAL_AREA_RATIO=0.05
          DATABASE_PATH=data/test_users.db
          DEFAULT_LATITUDE=17.3913
          DEFAULT_LONGITUDE=78.3206
          EOF

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov=config --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Security Scan
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan (bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r app/ config/ app.py -ll --skip B101
