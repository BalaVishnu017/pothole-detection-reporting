[flake8]
max-line-length = 100
extend-ignore = E203, W503, E501
exclude =
    .venv,
    venv,
    __pycache__,
    .git,
    build,
    dist,
    *.egg-info

[isort]
profile = black
line_length = 100
known_first_party = app,config

[tool:black]
line-length = 100
target-version = ['py310', 'py311', 'py312']
